name: Release

on:
  push:
    tags:
      - '*.*.*\+*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build nlc + nlvm
        run: cargo build -r --locked --target ${{ matrix.target }} -p nlc -p nlvm

      - name: Package
        run: |
          pkg=nlvm-${{ github.ref_name }}-${{ matrix.target }}
          mkdir "$pkg"
          cp target/${{ matrix.target }}/release/nlc "$pkg/"
          cp target/${{ matrix.target }}/release/nlvm "$pkg/"
          cp README.md LICENSE "$pkg/"
          tar czf "$pkg.tar.gz" "$pkg"
          shasum -a 256 "$pkg.tar.gz" > "$pkg.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: nlvm-${{ matrix.target }}
          path: |
            nlvm-*.tar.gz
            nlvm-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Combine checksums
        run: cat dist/*.sha256 > dist/SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
          generate_release_notes: true
