---
title: "interface extends — a class implementing the child interface satisfies instanceof/upcast for every ancestor interface too"
file_separator: "#NLFILE"
expected_exit_code: 111
expected_stdout: ""
---

#NLFILE phase11/ifaceextends/Disposable.nl
namespace phase11.ifaceextends;
interface Disposable {
	public void dispose();
}

#NLFILE phase11/ifaceextends/Closeable.nl
namespace phase11.ifaceextends;
interface Closeable extends Disposable {
	public void close();
}

#NLFILE phase11/ifaceextends/FileHandle.nl
namespace phase11.ifaceextends;
class FileHandle implements Closeable {
	public construct() {}
	public void close() {}
	public void dispose() {}
}

#NLFILE phase11/ifaceextends/Main.nl
namespace phase11.ifaceextends;
class Main {
	public static int main(string[] args) {
		FileHandle f = new FileHandle();
		Closeable c = f;
		Disposable d = f;
		int result = 0;
		if (f instanceof Closeable) {
			result = result + 1;
		}
		if (f instanceof Disposable) {
			result = result + 10;
		}
		if (c instanceof Disposable) {
			result = result + 100;
		}
		d.dispose();
		c.close();
		return result;
	}
}
