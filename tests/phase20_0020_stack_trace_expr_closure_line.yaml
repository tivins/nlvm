---
title: "Expression-body closure invoke frame (issue #13) reports a real line, not 0"
file_separator: "#NLFILE"
expected_exit_code: 0
expected_stdout: "3 nonzero"
---

#NLFILE phase20/exprclosureline/Helper.nl
namespace phase20.exprclosureline;
class Helper {
	public static void boom() {
		throw new IllegalArgumentException("bad");
	}
}

#NLFILE phase20/exprclosureline/Main.nl
namespace phase20.exprclosureline;
class Main {
	public static int main(string[] args) {
		auto f = () => Helper.boom();
		try {
			f();
		} catch (IllegalArgumentException e) {
			system.Out.print(system.Int.toString(e.stackTrace.length()));
			system.Out.print(" ");
			if (e.stackTrace[1].line != 0) {
				system.Out.print("nonzero");
			} else {
				system.Out.print("ZERO");
			}
		}
		return 0;
	}
}
