---
title: "if/else if/else chains via a helper method"
file_separator: "#NLFILE"
expected_exit_code: -9
expected_stdout: ""
---

#NLFILE phase2/ifelse/Main.nl
namespace phase2.ifelse;
class Main {
	private static int classify(int n) {
		if (n < 0) {
			return -1;
		} else if (n == 0) {
			return 0;
		} else {
			return 1;
		}
	}

	public static int main(string[] args) {
		return classify(5) + classify(-3) * 10 + classify(0) * 100;
	}
}
