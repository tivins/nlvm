#NLFILE phase2/fibonacci/Main.nl
namespace phase2.fibonacci;
class Main {
	private static int fib(int n) {
		if (n < 2) {
			return n;
		}
		return fib(n - 1) + fib(n - 2);
	}

	public static int main(string[] args) {
		return fib(10);
	}
}
