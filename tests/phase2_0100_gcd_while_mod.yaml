#NLFILE phase2/gcd/Main.nl
namespace phase2.gcd;
class Main {
	private static int gcd(int a, int b) {
		while (b != 0) {
			int t = b;
			b = a % b;
			a = t;
		}
		return a;
	}

	public static int main(string[] args) {
		return gcd(48, 18);
	}
}
