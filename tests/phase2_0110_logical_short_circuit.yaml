#NLFILE phase2/logical/Main.nl
namespace phase2.logical;
class Main {
	private static bool inRange(int n) {
		return n >= 0 && n < 10;
	}

	public static int main(string[] args) {
		if (inRange(5) && !inRange(15)) {
			return 1;
		}
		return 0;
	}
}
