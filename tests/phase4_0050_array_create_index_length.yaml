#NLFILE phase4/arrays/Main.nl
namespace phase4.arrays;
class Main {
	public static int main(string[] args) {
		int[] a = new int[5];
		a[0] = 10;
		a[1] = 20;
		a[4] = 12;
		int sum = 0;
		for (int i = 0; i < a.length(); i++) {
			sum = sum + a[i];
		}
		return sum;
	}
}
