#NLFILE phase9/closure_union_param_auto/Main.nl
namespace phase9.closure_union_param_auto;
class Main {
	public static int main(string[] args) {
		auto lengthOrZero = (string|null s) => {
			if (s == null) {
				return 0;
			}
			return s.length();
		};
		system.Out.print(system.Int.toString(lengthOrZero(null)));
		system.Out.print(",");
		system.Out.print(system.Int.toString(lengthOrZero("abc")));
		return 0;
	}
}
