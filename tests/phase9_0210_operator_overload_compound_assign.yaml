---
title: "Operator overloading — compound assignment `operator+=` mutates `this` and returns `Self`, distinct from `operator+`'s create-and-rebind (an alias observes the mutation)"
file_separator: "#NLFILE"
expected_exit_code: 0
expected_stdout: "6 9 6 9"
---

#NLFILE phase9/operatorcompoundassign/Vector2.nl
namespace phase9.operatorcompoundassign;
class Vector2 {
	public int x;
	public int y;

	public construct(int x, int y) {
		this.x = x;
		this.y = y;
	}

	public type operator+(const Vector2 vec) const {
		return new type(this.x + vec.x, this.y + vec.y);
	}

	// Compound assignment operator: mutates `this` in place and returns
	// `Self` — specs.md § Operator Overloading. Distinct from `operator+`
	// above: `p3 += v` must mutate the same object every alias observes,
	// not rebind `p3` to a freshly constructed one.
	public Self operator+=(const Vector2 vec) {
		this.x = this.x + vec.x;
		this.y = this.y + vec.y;
		return this;
	}
}

#NLFILE phase9/operatorcompoundassign/Main.nl
namespace phase9.operatorcompoundassign;
class Main {
	public static int main(string[] args) {
		auto p1 = new Vector2(1, 2);
		auto p2 = new Vector2(3, 4);
		auto p3 = p1 + p2;
		auto alias = p3;
		p3 += new Vector2(2, 3);
		system.Out.print(p3.x);
		system.Out.print(" ");
		system.Out.print(p3.y);
		system.Out.print(" ");
		// `alias` refers to the same object as `p3` — if `+=` had been
		// implemented as `p3 = p3 + rhs` (rebind via `operator+`) instead of
		// a true `operator+=` dispatch, `alias` would still show "4 6".
		system.Out.print(alias.x);
		system.Out.print(" ");
		system.Out.print(alias.y);
		return 0;
	}
}
